name: Delta update patch

on:
  push:
    paths:
      - "updates/app_*.apk"

concurrency:
  group: delta-update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  make-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bsdiff
        run: |
          sudo apt-get update
          sudo apt-get install -y bsdiff coreutils

      - name: Generate patch
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p updates

          # Find APKs by versionCode in filename: app_<code>.apk (sorted ascending).
          mapfile -t apks < <(ls -1 updates/app_*.apk 2>/dev/null | sed -E 's/.*app_([0-9]+)\.apk/\1 \0/' | sort -n | awk '{print $2}')
          if [ "${#apks[@]}" -lt 2 ]; then
            echo "Need at least two APKs in updates/: updates/app_<old>.apk and updates/app_<new>.apk"
            exit 1
          fi

          last_index="$((${#apks[@]} - 1))"
          latest_apk="${apks[$last_index]}"
          latest_v="$(echo "$latest_apk" | sed -E 's/.*app_([0-9]+)\.apk/\1/')"
          latest_sha="$(sha256sum "$latest_apk" | awk '{print $1}')"
          latest_size="$(wc -c < "$latest_apk" | tr -d ' ')"

          echo "Latest: $latest_apk (v=$latest_v)"
          echo "Latest sha256: $latest_sha"
          echo "Latest size: $latest_size"
          echo ""

          echo "Generating delta patches for consecutive versions (chain-friendly):"
          for ((i=0; i<${#apks[@]}-1; i++)); do
            old_apk="${apks[$i]}"
            new_apk="${apks[$i+1]}"
            old_v="$(echo "$old_apk" | sed -E 's/.*app_([0-9]+)\.apk/\1/')"
            new_v="$(echo "$new_apk" | sed -E 's/.*app_([0-9]+)\.apk/\1/')"

            patch="updates/${old_v}_${new_v}.patch"
            json="updates/update_${old_v}_${new_v}.json"

            echo " - $old_v -> $new_v"
            bsdiff "$old_apk" "$new_apk" "$patch"

            patch_size="$(wc -c < "$patch" | tr -d ' ')"
            patch_sha="$(sha256sum "$patch" | awk '{print $1}')"
            new_sha="$(sha256sum "$new_apk" | awk '{print $1}')"
            new_size="$(wc -c < "$new_apk" | tr -d ' ')"

            python3 - "$json" "$old_v" "$new_v" "$patch_sha" "$patch_size" "$new_sha" "$latest_v" "$latest_sha" "$latest_size" <<'PY'
import json
import sys

(
    out_path,
    old_v,
    new_v,
    patch_sha,
    patch_size,
    result_apk_sha,
    latest_v,
    latest_sha,
    latest_size,
) = sys.argv[1:]

payload = {
    "fromVersion": int(old_v),
    "toVersion": int(new_v),
    "patchUrl": f"https://apikey-fawn.vercel.app/updates/{old_v}_{new_v}.patch",
    "patchSha256": patch_sha,
    "patchSizeBytes": int(patch_size),
    "resultApkSha256": result_apk_sha,
    "apkUrl": f"https://apikey-fawn.vercel.app/updates/app_{latest_v}.apk",
    "apkSha256": latest_sha,
    "apkSizeBytes": int(latest_size),
}

with open(out_path, "w", encoding="utf-8") as f:
    json.dump(payload, f, indent=2, sort_keys=True)
    f.write("\n")
PY

            echo "   Firestore deltaPatches item:"
            echo "   {\"fromVersion\":${old_v},\"toVersion\":${new_v},\"patchUrl\":\"https://apikey-fawn.vercel.app/updates/${old_v}_${new_v}.patch\",\"patchSha256\":\"${patch_sha}\",\"patchSizeBytes\":${patch_size},\"resultApkSha256\":\"${new_sha}\"}"
          done

      - name: Commit patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase origin main
          git add updates/*.patch updates/update_*.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Generate delta patch"
          git push
